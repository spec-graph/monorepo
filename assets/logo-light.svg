<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="edge-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#00BFA5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="48" fill="url(#bg-light)"/>

  <!-- Directed edges -->
  <line x1="376" y1="256" x2="316" y2="360" stroke="url(#edge-light)" stroke-width="3" opacity="0.8"/>
  <line x1="316" y1="360" x2="196" y2="360" stroke="url(#edge-light)" stroke-width="3" opacity="0.8"/>
  <line x1="196" y1="360" x2="136" y2="256" stroke="url(#edge-light)" stroke-width="3" opacity="0.8"/>
  <line x1="136" y1="256" x2="196" y2="152" stroke="url(#edge-light)" stroke-width="3" opacity="0.8"/>
  <line x1="196" y1="152" x2="316" y2="152" stroke="url(#edge-light)" stroke-width="3" opacity="0.8"/>
  <line x1="316" y1="152" x2="376" y2="256" stroke="url(#edge-light)" stroke-width="3" opacity="0.8"/>

  <!-- Cross edges -->
  <line x1="376" y1="256" x2="196" y2="360" stroke="#1976D2" stroke-width="1.5" opacity="0.2"/>
  <line x1="196" y1="152" x2="136" y2="256" stroke="#1976D2" stroke-width="1.5" opacity="0.2"/>
  <line x1="316" y1="152" x2="316" y2="360" stroke="#1976D2" stroke-width="1.5" opacity="0.2"/>

  <!-- Arrow heads -->
  <polygon points="340,350 346,340 350,348" fill="#00BFA5" opacity="0.8"/>
  <polygon points="220,358 230,352 226,360" fill="#00BFA5" opacity="0.8"/>
  <polygon points="142,280 136,270 140,266" fill="#00BFA5" opacity="0.8"/>
  <polygon points="166,180 176,174 172,166" fill="#00BFA5" opacity="0.8"/>
  <polygon points="290,154 300,148 296,156" fill="#00BFA5" opacity="0.8"/>
  <polygon points="370,230 376,220 378,228" fill="#00BFA5" opacity="0.8"/>

  <!-- Nodes -->
  <circle cx="376" cy="256" r="22" fill="#00BFA5"/>
  <circle cx="316" cy="360" r="18" fill="#1976D2"/>
  <circle cx="196" cy="360" r="18" fill="#1976D2"/>
  <circle cx="136" cy="256" r="22" fill="#00BFA5"/>
  <circle cx="196" cy="152" r="18" fill="#1976D2"/>
  <circle cx="316" cy="152" r="18" fill="#1976D2"/>

  <!-- Inner dots -->
  <circle cx="376" cy="256" r="8" fill="#ffffff" opacity="0.3"/>
  <circle cx="136" cy="256" r="8" fill="#ffffff" opacity="0.3"/>

  <!-- Text -->
  <text x="256" y="448" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="42" fill="#1a1a2e" letter-spacing="2">spec-graph</text>

  <!-- Subtitle -->
  <text x="256" y="480" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="16" fill="#6b7280" letter-spacing="4">WORKFLOW ORCHESTRATION</text>
</svg>
