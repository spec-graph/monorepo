<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#00BFA5"/>
    </linearGradient>
  </defs>

  <!-- 6 Nodes in hexagon, center (128,128), radius 60 -->
  <!-- Nodes: 0°, 60°, 120°, 180°, 240°, 300° -->

  <!-- Directed edges (cycle) -->
  <line x1="188" y1="128" x2="158" y2="180" stroke="url(#edge)" stroke-width="2.5" opacity="0.8"/>
  <line x1="158" y1="180" x2="98" y2="180" stroke="url(#edge)" stroke-width="2.5" opacity="0.8"/>
  <line x1="98" y1="180" x2="68" y2="128" stroke="url(#edge)" stroke-width="2.5" opacity="0.8"/>
  <line x1="68" y1="128" x2="98" y2="76" stroke="url(#edge)" stroke-width="2.5" opacity="0.8"/>
  <line x1="98" y1="76" x2="158" y2="76" stroke="url(#edge)" stroke-width="2.5" opacity="0.8"/>
  <line x1="158" y1="76" x2="188" y2="128" stroke="url(#edge)" stroke-width="2.5" opacity="0.8"/>

  <!-- Cross edges -->
  <line x1="188" y1="128" x2="98" y2="180" stroke="#1976D2" stroke-width="1" opacity="0.2"/>
  <line x1="98" y1="76" x2="68" y2="128" stroke="#1976D2" stroke-width="1" opacity="0.2"/>
  <line x1="158" y1="76" x2="158" y2="180" stroke="#1976D2" stroke-width="1" opacity="0.2"/>

  <!-- Arrow heads -->
  <polygon points="170,175 175,167 178,174" fill="#00BFA5" opacity="0.8"/>
  <polygon points="112,178 120,173 117,179" fill="#00BFA5" opacity="0.8"/>
  <polygon points="72,140 67,132 70,130" fill="#00BFA5" opacity="0.8"/>
  <polygon points="83,90 90,85 88,83" fill="#00BFA5" opacity="0.8"/>
  <polygon points="145,78 153,73 150,79" fill="#00BFA5" opacity="0.8"/>
  <polygon points="185,115 188,107 190,113" fill="#00BFA5" opacity="0.8"/>

  <!-- Nodes (alternating sizes for visual hierarchy) -->
  <circle cx="188" cy="128" r="14" fill="#00BFA5"/>
  <circle cx="158" cy="180" r="11" fill="#1976D2"/>
  <circle cx="98" cy="180" r="11" fill="#1976D2"/>
  <circle cx="68" cy="128" r="14" fill="#00BFA5"/>
  <circle cx="98" cy="76" r="11" fill="#1976D2"/>
  <circle cx="158" cy="76" r="11" fill="#1976D2"/>

  <!-- Center dot -->
  <circle cx="128" cy="128" r="4" fill="#1976D2" opacity="0.5"/>
</svg>
