artifacts:
  - id: design/c4
    kind: design
    schema_ref: templates/c4-architecture.md
    provided_by: architecture
  - id: design/adr
    kind: design
    schema_ref: templates/adr.md
    optional: true
    provided_by: architecture
  - id: design/readiness
    kind: design
    schema_ref: templates/readiness-check.md
    provided_by: architecture
  - id: requirement/impact-map
    kind: requirement
    schema_ref: templates/impact-map.md
    optional: true
    provided_by: requirement-analysis
  - id: requirement/product-brief
    kind: requirement
    schema_ref: templates/product-brief.md
    optional: true
    provided_by: requirement-analysis
  - id: requirement/story-map
    kind: requirement
    schema_ref: templates/story-map.md
    provided_by: requirement-analysis
  - id: requirement/prd
    kind: requirement
    schema_ref: templates/prd.md
    provided_by: requirement-analysis
  - id: plan/epics
    kind: plan
    schema_ref: templates/epics.md
    provided_by: task-decomposition
  - id: plan/story
    kind: plan
    schema_ref: templates/story.md
    provided_by: task-decomposition
  - id: verification/review-report
    kind: verification
    schema_ref: templates/review-report.json
    provided_by: foundation
  - id: verification/test-report
    kind: verification
    schema_ref: templates/test-report.json
    provided_by: foundation
  - id: verification/acceptance-report
    kind: verification
    schema_ref: templates/acceptance-report.md
    provided_by: foundation
  - id: change-record/constitution
    kind: change-record
    schema_ref: templates/constitution.yaml
    provided_by: foundation
  - id: change-record/changelog
    kind: change-record
    schema_ref: templates/changelog.md
    provided_by: foundation
actions:
  - design
  - propose
  - specify
  - plan
  - implement
  - review
  - test
  - accept
  - integrate
  - archive
  - contract
checks:
  - id: architecture-review
    kind: lint
    command: <architecture-review>
    layer: unit
    provided_by: architecture
  - id: complexity-budget
    kind: lint
    command: <complexity-scan>
    layer: unit
    threshold:
      cyclomatic: 25
    provided_by: architecture
  - id: clarify-scan
    kind: lint
    command: <clarify-scan>
    layer: unit
    threshold:
      ambiguity: 0
      placeholder: 0
      non_measurable: 0
    provided_by: requirement-analysis
  - id: story-slicing
    kind: lint
    command: <story-slicing-check>
    layer: unit
    threshold:
      contract_fields_present: 7
    provided_by: task-decomposition
  - id: ac-test-binding
    kind: lint
    command: <ac-test-binding-check>
    layer: unit
    provided_by: task-decomposition
  - id: lint
    kind: lint
    command: npm run lint
    layer: unit
    provided_by: foundation
  - id: typecheck
    kind: lint
    command: npx tsc --noEmit
    layer: unit
    provided_by: foundation
  - id: unit-test
    kind: test
    command: npm test
    layer: unit
    threshold:
      coverage: 0.8
    provided_by: foundation
  - id: constitution-validate
    kind: lint
    command: <constitution-validate>
    layer: unit
    provided_by: foundation
  - id: contract-drift-scan
    kind: lint
    command: <contract-drift-scan>
    layer: integration
    provided_by: foundation
  - id: scope-lock-validate
    kind: lint
    command: <scope-lock-validate>
    layer: integration
    provided_by: foundation
  - id: clone-detection
    kind: clone
    command: <clone-detection>
    layer: unit
    threshold:
      dup_ratio_max: 0.1
    provided_by: foundation
  - id: reuse-scan
    kind: reuse
    command: <reuse-scan>
    layer: integration
    provided_by: foundation
gates:
  - id: architecture-ready
    on_transition:
      - design
      - plan
    require_artifacts:
      - design/c4
      - design/readiness
    require_checks:
      - architecture-review
    require_traces:
      - name: c4_to_req
        from_kind: design/c4
        to_kind: requirement/prd
        via:
          - derives
        cardinality: every
    fail_mode: block
    enabled: true
    require_contracts_current: false
    forbid: []
    provided_by: architecture
  - id: requirements-clarified
    on_transition:
      - specify
      - design
    require_artifacts:
      - requirement/prd
    require_checks:
      - clarify-scan
    require_traces:
      - name: story_to_req
        from_kind: plan/story
        to_kind: requirement/prd
        via:
          - derives
        cardinality: every
    fail_mode: block
    enabled: true
    require_contracts_current: false
    forbid: []
    provided_by: requirement-analysis
  - id: stories-decomposed
    on_transition:
      - plan
      - implement
    require_artifacts:
      - plan/epics
      - plan/story
    require_checks:
      - story-slicing
      - ac-test-binding
    fail_mode: block
    enabled: true
    require_traces: []
    require_contracts_current: false
    forbid: []
    provided_by: task-decomposition
  - id: entry-phase4
    on_transition:
      - plan
      - implement
    require_checks: []
    require_artifacts:
      - design/readiness
      - requirement/prd
      - plan/story
      - plan/epics
    require_traces:
      - name: c4_to_req
        from_kind: design/c4
        to_kind: requirement/prd
        via:
          - derives
        cardinality: every
      - name: story_to_req
        from_kind: plan/story
        to_kind: requirement/prd
        via:
          - derives
        cardinality: every
    require_contracts_current: false
    fail_mode: block
    enabled: true
    forbid: []
    provided_by: foundation
  - id: exit-merged
    on_transition:
      - accept
      - integrate
    require_checks:
      - lint
      - typecheck
      - unit-test
      - constitution-validate
      - contract-drift-scan
      - scope-lock-validate
      - clone-detection
      - reuse-scan
      - ac-test-binding
    require_artifacts:
      - verification/acceptance-report
      - change-record/constitution
    require_traces:
      - name: ac_to_test
        from_kind: plan/story
        to_kind: verification/test-report
        via:
          - verifies
        cardinality: every
    require_contracts_current: true
    fail_mode: block
    enabled: true
    forbid: []
    provided_by: foundation
tracks: []
pipeline_skeleton:
  stages:
    - implement
    - review
    - test
    - accept
  max_retries: 5
  on_exhausted: escalate
acceptance_layers:
  unit:
    required: true
    checks:
      - lint
      - typecheck
      - unit-test
  integration:
    required: true
    checks: []
  system:
    required: false
    checks: []
  deployment:
    required: false
    checks: []
