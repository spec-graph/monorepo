    provided_by: foundation
  - id: articles-validate
    kind: lint
    command: <articles-validate>
    layer: unit
    provided_by: foundation
gates:
  - id: architecture-ready
    on_transition:
      - design
      - plan
    require_artifacts:
      - design/c4
      - design/readiness
    require_checks:
      - architecture-review
    require_traces:
      - name: c4_to_req
        from_kind: design/c4
        to_kind: requirement/prd
        via:
          - derives
        cardinality: every
    fail_mode: block
    enabled: true
    require_contracts_current: false
    forbid: []
    provided_by: architecture
  - id: requirements-clarified
    on_transition:
      - specify
      - design
    require_artifacts:
      - requirement/prd
    require_checks:
      - clarify-scan
    require_traces:
      - name: story_to_req
        from_kind: plan/story
        to_kind: requirement/prd
        via:
          - derives
        cardinality: every
    fail_mode: block
    enabled: true
    require_contracts_current: false
    forbid: []
    provided_by: requirement-analysis
  - id: stories-decomposed
    on_transition:
      - plan
      - implement
    require_artifacts:
      - plan/epics
      - plan/story
    require_checks:
      - story-slicing
      - ac-test-binding
    fail_mode: block
    enabled: true
    require_traces: []
    require_contracts_current: false
    forbid: []
    provided_by: task-decomposition
  - id: strategic-design-complete
    on_transition:
      - specify
      - design
    require_artifacts:
      - design/context-map
      - design/ubiquitous-language
    require_checks: []
    fail_mode: block
    enabled: true
    require_traces: []
    require_contracts_current: false
    forbid: []
    provided_by: ddd
  - id: tactical-design-complete
    on_transition:
      - design
      - plan
    require_artifacts:
      - design/aggregates
      - design/domain-events
    require_checks: []
    fail_mode: block
    enabled: true
    require_traces: []
    require_contracts_current: false
    forbid: []
    provided_by: ddd
  - id: entry-phase4
    on_transition:
      - plan
      - implement
    require_checks: []
    require_artifacts:
      - design/readiness
      - requirement/prd
      - plan/story
      - plan/epics
      - design/aggregates
      - design/domain-events
    require_traces:
      - name: c4_to_req
        from_kind: design/c4
        to_kind: requirement/prd
        via:
          - derives
        cardinality: every
      - name: story_to_req
        from_kind: plan/story
        to_kind: requirement/prd
        via:
          - derives
        cardinality: every
      - name: aggregates_to_context_map
        from_kind: design/aggregates
        to_kind: design/context-map
        via:
          - derives
        cardinality: exists
    require_contracts_current: false
    fail_mode: block
    enabled: true
    forbid: []
    provided_by: foundation
  - id: exit-merged
    on_transition:
      - accept
      - integrate
    require_checks:
      - lint
      - typecheck
      - unit-test
      - constitution-validate
      - contract-drift-scan
      - scope-lock-validate
      - clone-detection
      - reuse-scan
      - acceptance-layer-audit
      - shared-contract-audit
      - command-safety-validate
      - articles-validate
      - ac-test-binding
      - bounded-context-audit
      - aggregate-invariant-check
      - context-map-consistency
    require_artifacts:
      - verification/acceptance-report
      - change-record/constitution
    require_traces:
      - name: ac_to_test
        from_kind: plan/story
        to_kind: verification/test-report
        via:
          - verifies
        cardinality: every
    require_contracts_current: true
    fail_mode: block
    enabled: true
    forbid: []
    provided_by: foundation
tracks: []
pipeline_skeleton:
  stages:
    - implement
    - review
    - test
    - accept
  max_retries: 5
  on_exhausted: escalate
acceptance_layers:
  unit:
    required: true
    checks:
      - lint
      - typecheck
      - unit-test
  integration:
    required: true
    checks:
      - bounded-context-audit
      - context-map-consistency
  system:
    required: false
    checks: []
  deployment:
    required: false
    checks: []
