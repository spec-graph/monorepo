checks:
  - id: architecture-review
    kind: lint
    command: <architecture-review>
    layer: unit
    provided_by: architecture
  - id: complexity-budget
    kind: lint
    command: <complexity-scan>
    layer: unit
    threshold:
      cyclomatic: 25
    provided_by: architecture
  - id: clarify-scan
    kind: lint
    command: <clarify-scan>
    layer: unit
    threshold:
      ambiguity: 0
      placeholder: 0
      non_measurable: 0
    provided_by: requirement-analysis
  - id: story-slicing
    kind: lint
    command: <story-slicing-check>
    layer: unit
    threshold:
      contract_fields_present: 7
    provided_by: task-decomposition
  - id: ac-test-binding
    kind: lint
    command: <ac-test-binding-check>
    layer: unit
    provided_by: task-decomposition
  - id: bounded-context-audit
    kind: lint
    command: <bounded-context-audit>
    layer: integration
    provided_by: ddd
  - id: aggregate-invariant-check
    kind: lint
    command: <aggregate-invariant-check>
    layer: unit
    provided_by: ddd
  - id: context-map-consistency
    kind: lint
    command: <context-map-consistency>
    layer: integration
    provided_by: ddd
  - id: domain-event-coverage
    kind: lint
    command: <domain-event-coverage>
    layer: integration
    provided_by: ddd
  - id: lint
    kind: lint
    command: npm run lint
    layer: unit
    provided_by: foundation
  - id: typecheck
    kind: lint
    command: npx tsc --noEmit
    layer: unit
    provided_by: foundation
  - id: unit-test
    kind: test
    command: npm test
    layer: unit
    threshold:
      coverage: 0.8
    provided_by: foundation
  - id: constitution-validate
    kind: lint
    command: <constitution-validate>
    layer: unit
    provided_by: foundation
  - id: contract-drift-scan
    kind: lint
    command: <contract-drift-scan>
    layer: integration
    provided_by: foundation
  - id: scope-lock-validate
    kind: lint
    command: <scope-lock-validate>
    layer: integration
    provided_by: foundation
  - id: clone-detection
