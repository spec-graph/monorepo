## 7. 执行与豁免

### 7.1 执行机制

- 宪法规则由 CI/CD 硬编码强制执行
- 无法自动化的规则由 Code Review 人工检查
- 违规 = 自动 comment + 阻断 merge

### 7.2 豁免流程

> 宪法规则**原则上不可豁免**。仅以下情况可申请临时豁免:

1. 生产环境 P0 事故,需要紧急 hotfix
2. 技术限制导致规则暂时无法满足
3. 业务时间窗口极端紧张

**豁免申请**:
- 提交 `waiver:{{ rule_id }}` 标签
- 说明原因 + 修复计划 + 修复截止日期
- 至少 2 名代码所有者批准
- 豁免期 ≤ 7 天

