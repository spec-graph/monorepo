## 6. 变更与演进

### 6.1 宪法修订流程

宪法本身的变更需要:

1. 提交宪法变更提案(Constitution Change Proposal, CCP)
2. 全体代码所有者 review
3. 2/3 多数通过
4. 更新版本号 + 记录变更日志

