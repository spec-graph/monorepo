## 3. 分支与发布策略

### 3.1 分支模型

```
main ──── production
  │
  └── develop ─── feature/S-XXX-story-name
           │
           └── hotfix/XXX
```

### 3.2 提交消息规范

```
{{ type}}{{scope}}: {{ subject}}

{{ body }}

Refs: {{ story_id }}
```

**类型(type):
- `feat`:新功能
- `fix`: bug 修复
- `docs`:文档
- `refactor`:重构
- `perf`:性能优化
- `test`:测试
- `chore`:构建/工具链

### 3.3 版本语义

```
MAJOR.MINOR.PATCH
│     │     │
│     │     └── 向后兼容的 bug 修复
│     └────── 向后兼容的新功能
└──────────── 不兼容的 API 变更
```

**版本 bump 触发条件:
- MAJOR:破坏消费者的 API 契约变更
- MINOR:新增 API 端点/功能,向后兼容
- PATCH:bug 修复,无 API 变更

---

## 4. 追溯链要求

> 本宪法强制执行端到端追溯链。违反以下任一规则,merge 被阻断。

### 4.1 追溯完整性规则

1. **Story → PRD**: 每个 Story 必须追溯到 PRD 的某个功能点
2. **AC → Test**:每个验收标准(AC)必须绑定至少一个测试用例
3. **Test → Code**:每个测试用例必须覆盖实际代码路径
4. **Code → Commit**:每次提交必须关联至少一个 Story ID
5. **Commit → Story**:提交消息必须包含 `Refs: S-XXX`

### 4.2 契约变更规则

1. **禁止无声契约变更**:任何 API 契约变更必须更新 OpenAPI 文档
2. **破坏性变更必须 bump MAJOR 版本
3. **消费者必须重新验证**:契约变更后,所有消费者必须重新验收
4. **废弃必须有宽限期**:API 废弃 → deprecation notice → 至少 2 个 release 后移除

---

## 5. 门禁规则 (Gating Rules)

### 5.1 开发准入门 (Phase 3 → Phase 4)

进入实现阶段前,以下必须齐备:

- [ ] PRD 已审批签字
- [ ] 架构设计文档已完备(C4 L1-L2)
- [ ] API 契约已冻结(OpenAPI vX.Y.Z)
- [ ] 数据模型已定义
- [ ] Stories 已分解,每个 Story 有 7 个契约字段
- [ ] 追溯链已建立(Story → PRD → 架构 → 契约)

### 5.2 Merge 准入门 (Phase 4 → MERGED)

代码合入 main 前必须满足:

- [ ] 所有 CI checks 通过
- [ ] 测试覆盖率 ≥ 80%
- [ ] 无安全漏洞(Critical/High)
- [ ] Code Review 至少 1 个 approver
- [ ] 所有 AC 绑定测试并通过
- [ ] 追溯链完整(Story → Test → Code → Commit)
- [ ] 无破坏性契约变更(除非 MAJOR bump)
- [ ] 无漂移(实现与契约一致)

