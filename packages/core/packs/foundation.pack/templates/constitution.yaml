## 2. 质量标准

### 2.1 代码质量

| 维度 | 标准 | 强制执行方式 |
|------|------|-------------|
| **测试覆盖率** | ≥ 80% | CI 门控,低于则阻断 merge |
| **Linter** | 零 warning | CI 门控,ESLint/Prettier 自动修复 |
| **类型检查** | 零 error | CI 门控,TypeScript 严格模式 |
| **圈复杂度** | ≤ 15 | 复杂度扫描工具 |
| **Code Review** | 至少 1 个 approver | GitHub PR 规则 |

### 2.2 文档标准

- 每个 API 端点必须有 OpenAPI 文档
- 每个公共函数必须有 JSDoc/TSDoc
- 每个 Story 必须有 AC 绑定测试
- 架构变更必须有 ADR

### 2.3 安全标准

- OWASP Top 10 全扫描
- 依赖漏洞扫描(Snyk/Dependabot)
- 密钥硬编码检测(gitleaks)
- SQL 注入扫描

