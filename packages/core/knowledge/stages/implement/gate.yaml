entry:
  - id: plan-passed-gate
    description: The plan stage has passed its exit gate (tasks.md is complete)
    verification: rule

exit:
  - id: implement-source-exists
    description: Implement directory contains at least one source file (non-.md/.yaml/.json)
    verification: rule

  - id: implement-validation-passed
    description: Sub-agent ran validation (typecheck, lint, tests, build) and validation-report.json shows validation_passed: true
    verification: rule

  - id: all-tasks-implemented
    description: Every task in tasks.md is marked complete (- [x])
    verification: rule

  - id: no-broken-contracts
    description: No existing APIs/interfaces were broken without a migration path
    verification: traceability
