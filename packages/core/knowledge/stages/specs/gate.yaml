# Gate configuration for the specs stage.
#
# Entry criteria: what must be true BEFORE entering specs.
# Exit criteria: what must be true BEFORE leaving specs (→ moving to design).

entry:
  - id: proposal-exists
    description: proposal.md has been created by the specify stage
    verification: rule

exit:
  - id: specs-exists
    description: specs.md has been created
    verification: rule

  - id: specs-one-per-capability
    description: At least one Requirement section exists in specs.md
    verification: rule

  - id: specs-requirement-format
    description: Each requirement uses "### Requirement: <name>" format
    verification: rule

  - id: specs-shall-must
    description: Requirements use SHALL/MUST for normative statements (not should/may)
    verification: rule

  - id: specs-scenarios-present
    description: Every requirement has at least one #### Scenario with WHEN/THEN
    verification: rule

  - id: specs-length
    description: specs.md is between 200-3000 words
    verification: rule
