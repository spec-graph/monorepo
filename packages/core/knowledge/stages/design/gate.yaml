entry:
  - id: proposal-passed-gate
    description: The specify stage has passed its exit gate (proposal is complete and valid)
    verification: rule

exit:
  # Specs exit criteria
  - id: specs-one-per-capability
    description: One spec file exists for each capability listed in the proposal
    verification: traceability

  - id: specs-requirement-format
    description: Each requirement uses "### Requirement: <name>" format
    verification: rule

  - id: specs-shall-must
    description: Requirements use SHALL/MUST for normative statements (not should/may)
    verification: rule

  - id: specs-scenarios-present
    description: Every requirement has at least one #### Scenario with WHEN/THEN
    verification: rule

  - id: specs-delta-operations
    description: Delta specs use proper ADDED/MODIFIED/REMOVED/RENAMED headers
    verification: rule

  # Design exit criteria
  - id: design-exists-if-needed
    description: design.md exists if change is cross-cutting, has new dependencies, or has security/perf/migration complexity
    verification: rule

  - id: design-covers-specs
    description: design.md references and covers every spec requirement (traceability)
    verification: traceability

  - id: design-rationale
    description: Technical choices include rationale (why X over Y). Each "Decision" or "ADR" section must contain a "Rationale" or "Why" subsection.
    verification: rule

  - id: alternatives-considered
    description: Each decision has an "Alternatives considered" or "Alternatives Considered" subsection with at least one alternative described.
    verification: rule

  - id: design-risks
    description: design.md contains a "Risks" or "Trade-offs" section
    verification: rule

  - id: design-length
    description: design.md is between 300-3000 words (roughly 1-6 pages)
    verification: rule

  - id: design-risks
    description: design.md has a Risks/Trade-offs section
    verification: rule
