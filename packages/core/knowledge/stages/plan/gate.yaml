    description: tasks.md has been created
    verification: rule

  - id: tasks-checkbox-format
    description: All tasks use checkbox format (- [ ] X.Y Task description)
    verification: rule

  - id: tasks-grouped
    description: Tasks are grouped under ## numbered headings
    verification: rule

  - id: tasks-cover-design
    description: Tasks cover every component/decision in design.md (traceability)
    verification: traceability

  - id: tasks-verifiable
    description: Each task is verifiable (you know when it's done)
