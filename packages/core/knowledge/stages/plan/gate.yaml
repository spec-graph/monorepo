entry:
  - id: design-passed-gate
    description: The design stage has passed its exit gate (specs + design.md are complete)
    verification: rule

exit:
  - id: tasks-exists
    description: tasks.md has been created
    verification: rule

  - id: tasks-checkbox-format
    description: All tasks use checkbox format (- [ ] X.Y Task description)
    verification: rule

  - id: tasks-grouped
    description: Tasks are grouped under ## numbered headings
    verification: rule

  - id: tasks-cover-design
    description: Tasks cover every component/decision in design.md (traceability)
    verification: traceability

  - id: tasks-verifiable
    description: Each task has a clear completion criterion (contains specific, measurable language)
    verification: rule

  - id: tasks-sized-appropriately
    description: No single task description exceeds 200 characters (indicates appropriately scoped tasks)
    verification: rule

  - id: user-story-traceability
    description: Tasks table includes User Story references (US-xxx column or US-xxx in task description)
    verification: rule
