entry:
  - id: review-passed-gate
    description: Code review passed (all findings resolved or accepted)
    verification: rule

exit:
  - id: all-tests-pass
    description: All tests pass (unit, integration, e2e)
    verification: rule

  - id: coverage-met
    description: Code coverage meets project threshold (if defined)
    verification: rule

  - id: new-code-tested
    description: All new code has corresponding tests
    verification: traceability

  - id: edge-cases-covered
    description: Test files include edge case / error / boundary scenarios (filenames or describe blocks mention these terms)
    verification: rule
