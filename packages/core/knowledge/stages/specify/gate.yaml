# Gate configuration for the specify stage.
#
# Entry criteria: what must be true BEFORE entering specify.
# Exit criteria: what must be true BEFORE leaving specify (→ moving to design).
#
# Each criterion has:
#   - id: unique identifier
#   - description: human-readable description
#   - verification: how to check this criterion
#       - rule: deterministic check (file exists, structure matches, etc.)
#       - traceability: check relationship between artifacts
#       - llm-judge: use LLM with rubric
#       - downstream-executability: can the next stage be executed based on this?
#       - human: requires human confirmation
#
# Entry criteria
entry:
  - id: plan-confirmed
    description: A plan has been confirmed by the user (plan.yaml exists and is marked confirmed)
    verification: rule

# Exit criteria
exit:
  - id: proposal-exists
    description: proposal.md has been created
    verification: rule

  - id: proposal-structure
    description: proposal.md contains the required sections (Why / What Changes / Capabilities / Impact)
    verification: rule

  - id: capabilities-enumerated
    description: At least one capability is listed in the Capabilities section. Use format '- `kebab-name`: description' or '- **bold-name**: description'
    verification: rule

  - id: user-personas-defined
    description: Proposal contains at least one User Persona with characteristics and goals
    verification: rule

  - id: user-stories-present
    description: Proposal contains at least one User Story in 'As a [type], I want [goal], So that [benefit]' format. Skip for pure-refactoring changes.
    verification: rule

  - id: capabilities-map-to-stories
    description: Each capability references at least one User Story it serves (US-xxx format)
    verification: rule

  - id: capabilities-kebab-case
    description: All capability identifiers use kebab-case
    verification: rule

  - id: proposal-length
    description: Proposal is between 200-1500 words (roughly 1-2 pages)
    verification: rule

  - id: focuses-on-why
    description: "Why" section exists and is placed before "What Changes"
    verification: rule

  - id: scope-defined
    description: Proposal contains an "Out of Scope" section
    verification: rule

  - id: risks-identified
    description: Proposal contains a "Risks" or "Impact" section that identifies potential issues
    verification: rule
