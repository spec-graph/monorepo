entry:
  - id: implement-passed-gate
    description: All tasks complete, lint/typecheck/build/tests pass
    verification: rule

exit:
  - id: review-completed
    description: A code review has been performed and all issues are resolved or explicitly accepted
    verification: rule

  - id: review-findings-addressed
    description: Every review finding is either fixed or explicitly marked as acceptable with justification
    verification: rule

  - id: security-reviewed
    description: Security-sensitive code has been explicitly reviewed
    verification: rule

  - id: design-compliance
    description: Implementation matches the design document
    verification: traceability
