entry:
  - id: accept-passed-gate
    description: E2E verification passed with user approval
    verification: rule

exit:
  - id: pr-created
    description: A pull request (or equivalent) has been created
    verification: rule

  - id: ci-passes
    description: CI pipeline passes (all jobs green)
    verification: rule

  - id: change-archive-ready
    description: Change artifacts are ready for archive (if using OpenSpec-style archiving)
    verification: rule

  - id: trace-complete
    description: Trace from intent → spec → design → task → code → test → pr is complete
    verification: traceability
