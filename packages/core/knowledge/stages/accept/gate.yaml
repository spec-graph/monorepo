entry:
  - id: test-passed-gate
    description: All tests pass with required coverage
    verification: rule

exit:
  - id: e2e-scenarios-verified
    description: All end-to-end scenarios pass (real requests, real responses)
    verification: rule

  - id: scenarios-match-specs
    description: E2E scenarios trace back to spec scenarios (every spec scenario has e2e coverage)
    verification: traceability

  - id: acceptance-approved
    description: User has reviewed the e2e verification report and approved
    verification: human

  - id: no-critical-regressions
    description: No critical regressions from prior behavior
    verification: rule
